<!DOCTYPE html>
<html>
<head>
<title>Arc Reactor Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>ARC REACTOR ENERGY DISTRIBUTION PANEL</h1>

<!-- Arc Reactor Image -->
<div class="reactor">
    <img src="JARVIS.jpg" alt="Arc Reactor" class="reactor-img">
</div>

<!-- Overall Energy Progress Bar -->
<div class="overall-progress">
    <p>Reactor Core Energy</p>
    <div class="progress">
        <div id="overallBar" class="progress-bar"></div>
    </div>
</div>

<div class="energy">
    Total Energy: 100 Units
    <br>
    Remaining Energy: <span id="remaining">100</span>
</div>

<div class="systems">

    <div class="system">
        <h3>Propulsion</h3>
        <button onclick="changeEnergy('prop',-5)">-</button>
        <span id="prop">0</span>
        <button onclick="changeEnergy('prop',5)">+</button>
        <p id="propStatus">Efficiency: Low</p>
        <div class="progress">
            <div id="propBar" class="progress-bar"></div>
        </div>
    </div>

    <div class="system">
        <h3>Defense</h3>
        <button onclick="changeEnergy('def',-5)">-</button>
        <span id="def">0</span>
        <button onclick="changeEnergy('def',5)">+</button>
        <p id="defStatus">Efficiency: Low</p>
        <div class="progress">
            <div id="defBar" class="progress-bar"></div>
        </div>
    </div>

    <div class="system">
        <h3>Navigation</h3>
        <button onclick="changeEnergy('nav',-5)">-</button>
        <span id="nav">0</span>
        <button onclick="changeEnergy('nav',5)">+</button>
        <p id="navStatus">Efficiency: Low</p>
        <div class="progress">
            <div id="navBar" class="progress-bar"></div>
        </div>
    </div>

    <div class="system">
        <h3>Communication</h3>
        <button onclick="changeEnergy('com',-5)">-</button>
        <span id="com">0</span>
        <button onclick="changeEnergy('com',5)">+</button>
        <p id="comStatus">Efficiency: Low</p>
        <div class="progress">
            <div id="comBar" class="progress-bar"></div>
        </div>
    </div>

</div>

<p id="warning">System Stable</p>

<script src="script.js"></script>

</body>
</html>
